<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Àrea Privada - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #984c4c;
            --primary-light: #b36060;
            --secondary: #D4A574;
            --accent: #E8956B;
            --dark: #1A1A1A;
            --light: #FAFAF8;
            --gray: #6B7280;
            --gray-light: #F3F4F6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, rgba(152, 76, 76, 0.05) 0%, rgba(212, 165, 116, 0.05) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .login-visual {
            background: linear-gradient(135deg, rgba(152, 76, 76, 0.95) 0%, rgba(179, 96, 96, 0.9) 100%),
                        url('https://images.unsplash.com/photo-1583422409516-2895a77efded?w=800&q=80') center/cover;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .login-visual-logo {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2rem;
        }

        .login-visual h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
        }

        .login-visual p {
            font-size: 1.1rem;
            opacity: 0.95;
            line-height: 1.7;
        }

        .login-form-section {
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-header {
            margin-bottom: 3rem;
        }

        .login-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--gray);
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 2px solid var(--gray-light);
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
            background: var(--light);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }

        .form-checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .form-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .form-checkbox-label {
            color: var(--gray);
            font-size: 0.95rem;
            cursor: pointer;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 2rem;
        }

        .forgot-password a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(152, 76, 76, 0.3);
        }

        .login-footer {
            margin-top: 2rem;
            text-align: center;
            color: var(--gray);
            font-size: 0.95rem;
        }

        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .back-home {
            text-align: center;
            margin-top: 2rem;
        }

        .back-home a {
            color: var(--gray);
            text-decoration: none;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s ease;
        }

        .back-home a:hover {
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .login-container {
                grid-template-columns: 1fr;
            }

            .login-visual {
                padding: 3rem 2rem;
            }

            .login-form-section {
                padding: 3rem 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <!-- Visual Side -->
        <div class="login-visual">
            <div class="login-visual-logo">SF</div>
            <h1>Benvingut/da</h1>
            <p>Àrea privada per a entitats membres de la Coordinadora de la Sagrada Família</p>
        </div>

        <!-- Form Side -->
        <div class="login-form-section">
            <div class="login-header">
                <h2>Inicia sessió</h2>
                <p>Accedeix amb el teu compte d'entitat</p>
            </div>

            <form>
                <div class="form-group">
                    <label class="form-label" for="email">Correu electrònic</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="entitat@exemple.cat"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contrasenya</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="••••••••"
                        required
                    >
                </div>

                <div class="form-checkbox-group">
                    <input type="checkbox" id="remember" class="form-checkbox">
                    <label for="remember" class="form-checkbox-label">Recorda'm</label>
                </div>

                <div class="forgot-password">
                    <a href="#">Has oblidat la contrasenya?</a>
                </div>

                <button type="submit" class="btn-login">Accedir</button>
            </form>

            <div class="login-footer">
                <p>No tens compte? <a href="#">Contacta amb l'administrador</a></p>
            </div>

            <div class="back-home">
                <a href="#">← Tornar a l'inici</a>
            </div>
        </div>

    </div>

</body>
</html>
